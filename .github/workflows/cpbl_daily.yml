name: CPBL Daily Prediction

on:
  schedule:
    # 每天台灣時間 10:00 (UTC+8) = UTC 02:00
    - cron: "0 2 * * *"
  workflow_dispatch:   # 手動觸發

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily prediction
        env:
          CPBL_DEMO: "1"   # 改成 "0" 可抓即時資料
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import json, os, sys
          from datetime import date
          sys.path.insert(0, ".")
          from cpbl.elo import ELOSystem
          from cpbl.predictor import PredictionModel
          import cpbl.mock_data as mock

          today = date.today()
          elo   = ELOSystem()
          model = PredictionModel(elo)
          games = mock.get_today_games(today)

          results = []
          for g in games:
              if g.get("away") and g.get("home"):
                  pred = model.predict(g)
                  g["prediction"] = pred
                  results.append(g)

          # 存 JSON
          os.makedirs("predictions", exist_ok=True)
          out = f"predictions/{today}.json"
          with open(out, "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2, default=str)
          print(f"Saved: {out}")

          # Discord 通知
          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")
          if webhook and results:
              import requests
              lines = ["**⚾ CPBL 今日賽前預測**\n"]
              for g in results:
                  p = g.get("prediction", {})
                  if not p: continue
                  hw = int(p["home_win_prob"] * 100)
                  aw = 100 - hw
                  win = g["home_name"] if p["winner"] == "home" else g["away_name"]
                  lines.append(
                      f"**{g['away_name']}** `{aw}%`  vs  `{hw}%` **{g['home_name']}**"
                      f"  →  🏆 {win} (信心 {p['confidence']:.0f}%)"
                  )
              requests.post(webhook, json={"content": "\n".join(lines)}, timeout=10)
              print("Discord notified")
          EOF

      - name: Commit predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/ || true
          git diff --staged --quiet || git commit -m "chore: add prediction $(date +%Y-%m-%d)"
          git push
