name: NPB/KBO Live Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  live-update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Live monitoring loop
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

          MISS=0
          SEEN=0

          while [ $MISS -lt 3 ]; do
            python live_update.py

            COUNT=$(python -c "
          import json, sys
          try:
            d = json.load(open('docs/picks_latest.json', encoding='utf-8'))
            print(len(d.get('live_games', [])))
          except:
            print(0)
          ")

            if [ "$COUNT" -gt 0 ]; then
              echo "偵測到 $COUNT 場比賽進行中"
              MISS=0
              SEEN=1
              git add docs/picks_latest.json
              if ! git diff --cached --quiet; then
                git commit -m "chore: live score update [skip ci]"
                git pull --rebase -X ours origin HEAD || true
                git push origin HEAD
              fi
              sleep 300
            else
              MISS=$((MISS + 1))
              if [ $SEEN -eq 0 ]; then
                echo "尚未偵測到比賽，等待中... (miss $MISS)"
                sleep 600
              else
                echo "比賽已結束？連續 $MISS/3 次無比賽"
                sleep 300
              fi
            fi
          done

          echo "連續 3 次無場中比賽，自動結束。"
          python3 -c "
          import json, time
          d = json.load(open('docs/picks_latest.json', encoding='utf-8'))
          d['live_games'] = []
          d['live_updated_at'] = ''
          d['live_updated_ts'] = int(time.time())
          json.dump(d, open('docs/picks_latest.json', 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
          "
          git add docs/picks_latest.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: clear live games [skip ci]"
            git pull --rebase -X ours origin HEAD || true
            git push origin HEAD
          fi
