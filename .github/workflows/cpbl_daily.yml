name: CPBL Daily Prediction

on:
  workflow_dispatch:   # 純手動觸發

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        env:
          CPBL_DEMO: "0"
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python - <<'EOF'
          import json, os, sys
          from datetime import date, datetime, timezone, timedelta
          sys.path.insert(0, ".")
          from cpbl.scraper import CPBLScraper
          from cpbl.elo import ELOSystem
          from cpbl.predictor import PredictionModel
          from cpbl.odds import OddsFetcher
          import cpbl.mock_data as mock

          TW = timezone(timedelta(hours=8))

          def is_pregame_window(games):
              """
              如果現在台灣時間距離任何一場比賽開始 <= 2 小時，回傳 True。
              比賽的 time 欄位格式為 "HH:MM"（台灣時間）。
              若抓不到時間，fallback 到常見開賽時段判斷。
              """
              now_tw = datetime.now(TW)
              for g in games:
                  t = g.get("time", "")
                  if t and ":" in t:
                      try:
                          h, m = map(int, t.split(":")[:2])
                          game_dt = now_tw.replace(hour=h, minute=m, second=0, microsecond=0)
                          diff = (game_dt - now_tw).total_seconds() / 60  # 分鐘
                          if 0 <= diff <= 120:
                              print(f"  → {g.get('away_name','?')} vs {g.get('home_name','?')} 開賽時間 {t}，距今 {diff:.0f} 分鐘，符合賽前2小時")
                              return True
                      except Exception:
                          pass
              # fallback：沒有時間資訊時，用常見開賽時段判斷
              # 13:05 / 17:05 / 18:35 台灣時間的前兩小時區間
              now_min = now_tw.hour * 60 + now_tw.minute
              for start_h, start_m in [(13, 5), (17, 5), (18, 35)]:
                  start_min = start_h * 60 + start_m
                  if (start_min - 120) <= now_min <= start_min:
                      print(f"  → fallback: 現在 {now_tw.strftime('%H:%M')} 在 {start_h:02d}:{start_m:02d} 賽前2小時區間內")
                      return True
              return False

          today    = date.today()
          now_tw   = datetime.now(TW)
          elo      = ELOSystem()
          model    = PredictionModel(elo)
          scraper  = CPBLScraper()
          fetcher  = OddsFetcher()

          print(f"執行時間（台灣）：{now_tw.strftime('%Y-%m-%d %H:%M')}")

          # 1. 賽程
          try:
              games = scraper.fetch_schedule(today)
              if not games:
                  raise ValueError("empty")
              print(f"Scraped {len(games)} games from cpbl.com.tw")
          except Exception as e:
              print(f"Scraper failed ({e}), using mock data")
              games = mock.get_today_games(today)

          # 2. 判斷是否在賽前兩小時內
          official = is_pregame_window(games)
          print(f"{'【正式紀錄】賽前2小時內' if official else '【預覽模式】不在賽前2小時內，不記錄'}")

          # 3. 賠率
          quota = fetcher.quota()
          print(f"Odds API quota: {quota}")
          all_odds = fetcher.fetch_all()
          print(f"Fetched odds for {len(all_odds)} games")

          # 4. 預測
          results = []
          for g in games:
              if not (g.get("away") and g.get("home")):
                  continue
              key     = f"{g['away']}-{g['home']}"
              odds    = all_odds.get(key, {})
              weather = None
              try:
                  weather = scraper.fetch_weather(g.get("venue", ""))
              except Exception:
                  pass
              g["prediction"] = model.predict(g, weather, odds)
              g["odds_raw"]   = odds
              results.append(g)

          # 印預覽（不管正不正式都印）
          for g in results:
              p = g.get("prediction", {})
              if not p:
                  continue
              hw  = int(p["home_win_prob"] * 100)
              win = g.get("home_name","主") if p["winner"] == "home" else g.get("away_name","客")
              print(f"  {g.get('away_name')} vs {g.get('home_name')}  →  {win} ({100-hw}%/{hw}%)  信心{p['confidence']:.0f}%")

          if not official:
              print("非賽前2小時，結束（不儲存/不推播/不更新Gist）")
              sys.exit(0)

          # 5. 存 JSON
          import requests as req
          os.makedirs("predictions", exist_ok=True)
          out = f"predictions/{today}.json"
          with open(out, "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2, default=str)
          print(f"Saved: {out}")

          # 6. Discord 推播
          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")
          if webhook and results:
              lines = [f"**⚾ CPBL 今日賽前預測 {today}**\n"]
              for g in results:
                  p = g.get("prediction", {})
                  if not p:
                      continue
                  hw   = int(p["home_win_prob"] * 100)
                  aw   = 100 - hw
                  win  = g.get("home_name","主隊") if p["winner"] == "home" else g.get("away_name","客隊")
                  conf = p["confidence"]
                  of   = p.get("factors", {}).get("odds", {})
                  h_odds = of.get("curr_home_odds", "?")
                  a_odds = of.get("curr_away_odds", "?")
                  mkt    = of.get("market_home_prob", "?")
                  vg     = of.get("analysis", {}).get("value_gap", 0) if of.get("analysis") else 0
                  sigs   = of.get("signals", [])
                  sig_txt = ("  " + " | ".join(sigs[:2])) if sigs else ""
                  lines.append(
                      f"**{g.get('away_name','?')}** `{aw}%`  vs  `{hw}%` **{g.get('home_name','?')}**"
                      f"  →  🏆 **{win}** (信心 {conf:.0f}%)\n"
                      f"  📋 賠率 客`{a_odds}` / 主`{h_odds}`  市場主隊`{mkt}%`  差距`{vg:+.0f}%`"
                      + sig_txt
                  )
              req.post(webhook, json={"content": "\n".join(lines)}, timeout=10)
              print("Discord notified")

          # 7. 更新 Gist
          gist_token = os.environ.get("GIST_TOKEN", "")
          if gist_token and results:
              with open(f"predictions/{today}.json", encoding="utf-8") as f:
                  content = f.read()
              headers = {
                  "Authorization": f"Bearer {gist_token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              gist_id = None
              r = req.get("https://api.github.com/gists", headers=headers, timeout=10)
              if r.status_code == 200:
                  for g in r.json():
                      if g.get("description") == "CPBL Predictions Archive":
                          gist_id = g["id"]
                          break
              filename = f"cpbl-{today}.json"
              payload  = {"files": {filename: {"content": content}}}
              if gist_id:
                  r2 = req.patch(f"https://api.github.com/gists/{gist_id}", headers=headers, json=payload, timeout=10)
                  print(f"Gist updated ({r2.status_code}): https://gist.github.com/{gist_id}")
              else:
                  payload["description"] = "CPBL Predictions Archive"
                  payload["public"] = False
                  r2 = req.post("https://api.github.com/gists", headers=headers, json=payload, timeout=10)
                  if r2.status_code == 201:
                      gist_id = r2.json()["id"]
                      print(f"Gist created: {r2.json().get('html_url')}")
                  else:
                      print(f"Gist create failed: {r2.status_code}")
              if gist_id:
                  with open(os.environ.get("GITHUB_ENV", "/dev/null"), "a") as ef:
                      ef.write(f"GIST_ID={gist_id}\n")
          EOF

      - name: Commit predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/ || true
          git diff --staged --quiet || git commit -m "chore: add prediction $(date +%Y-%m-%d)" && git push || true

      - name: Generate static site
        run: python generate_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
