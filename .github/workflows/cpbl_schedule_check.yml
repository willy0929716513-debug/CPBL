name: NPB/KBO Schedule Check

on:
  schedule:
    # 每天 JST 11:00 (02:00 UTC) — 午前賽事提醒
    - cron: "0 2 * * *"
    # 每天 JST 17:30 (08:30 UTC) — 晚間賽事提醒（大部分 NPB/KBO 夜間賽）
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Check today's NPB/KBO schedule
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import os, sys
          from datetime import date, datetime, timezone, timedelta
          sys.path.insert(0, ".")
          from cpbl.scraper import MultiLeagueScraper
          import requests

          JST     = timezone(timedelta(hours=9))
          today   = date.today()
          now_jst = datetime.now(JST)
          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")
          scraper = MultiLeagueScraper()

          print(f"偵測時間（JST）：{now_jst.strftime('%Y-%m-%d %H:%M')}")

          try:
              games = scraper.fetch_schedule(today)
              print(f"取得 {len(games)} 場賽事（ESPN API）")
          except Exception as e:
              print(f"Scraper failed ({e})")
              games = []

          valid = [g for g in games if g.get("away") and g.get("home")]
          npb_games = [g for g in valid if g.get("league") == "NPB"]
          kbo_games = [g for g in valid if g.get("league") == "KBO"]

          print(f"今日賽事：NPB {len(npb_games)} 場 | KBO {len(kbo_games)} 場")

          if not webhook:
              sys.exit(0)

          if not valid:
              print("今日無賽事，不推播")
              sys.exit(0)

          time_label = now_jst.strftime("%H:%M")
          lines = [f"⚾ **NPB/KBO 今日賽事** {today}（{time_label} JST 偵測）\n"]

          if npb_games:
              lines.append("🇯🇵 **NPB**")
              for g in npb_games:
                  a = g.get("away_name", g.get("away", "?"))
                  h = g.get("home_name", g.get("home", "?"))
                  t = g.get("time", "")
                  v = g.get("venue", "")
                  line = f"• **{a}** @ **{h}**"
                  if t: line += f"  🕐 {t[11:16]} JST"
                  if v: line += f"  📍 {v}"
                  lines.append(line)

          if kbo_games:
              lines.append("\n🇰🇷 **KBO**")
              for g in kbo_games:
                  a = g.get("away_name", g.get("away", "?"))
                  h = g.get("home_name", g.get("home", "?"))
                  t = g.get("time", "")
                  v = g.get("venue", "")
                  line = f"• **{a}** @ **{h}**"
                  if t: line += f"  🕐 {t[11:16]} KST"
                  if v: line += f"  📍 {v}"
                  lines.append(line)

          msg = "\n".join(lines)
          r = requests.post(webhook, json={"content": msg}, timeout=8)
          print(f"Discord notified ({r.status_code})")
          EOF
