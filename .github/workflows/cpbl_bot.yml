name: NPB/KBO Bot

on:
  # data update 完成後自動接著跑（主要觸發）
  workflow_run:
    workflows: ["📊 Auto Data Update (NPB/KBO)"]
    types: [completed]
    branches: [main]
  # 備用：每天 06:45 JST 直接跑（data update 若失敗也能跑）
  schedule:
    - cron: '45 21 * * *'
  # 手動觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (Chromium)
        run: playwright install chromium --with-deps

      - name: Show data freshness
        run: |
          echo "=== pitcher_stats.json ==="
          if [ -f data/pitcher_stats.json ]; then
            python -c "import json; d=json.load(open('data/pitcher_stats.json')); print('Updated:', d.get('updated_at','unknown'), '| Players:', len(d.get('stats',{})))"
          else
            echo "not found — will use mock data"
          fi
          echo "=== schedule.json ==="
          if [ -f data/schedule.json ]; then
            python -c "import json; d=json.load(open('data/schedule.json')); print('Games:', len(d.get('games',[])))"
          fi
          echo "=== odds_today.json ==="
          if [ -f data/odds_today.json ]; then
            python -c "import json; d=json.load(open('data/odds_today.json')); print('Date:', d.get('game_date','?'), '| Source:', d.get('source','?'), '| Games:', len(d.get('odds',{})))"
          else
            echo "not found — will use MOCK_ODDS"
            echo "Tip: run 'python scripts/update_stats.py --odds-only --push' locally to get real odds"
          fi

      - name: Run CPBL Bot
        env:
          CPBL_DEMO:        "0"
          ODDS_API_KEY:     ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN:         ${{ secrets.GIST_TOKEN }}
        run: python cpbl_bot.py

      - name: Commit picks_latest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true
          git add docs/picks_latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update picks_latest.json [skip ci]"
            git pull --rebase -X ours origin HEAD || true
            git push origin HEAD
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
