<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>CPBL Protector вҡҫ</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{
  background:#0f172a;color:#e2e8f0;
  font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
header{padding-top:env(safe-area-inset-top,0px)}
.card{background:#1e293b;border:1px solid #334155;border-radius:.875rem}
.tier-1{border-left:4px solid #38bdf8}
.tier-2{border-left:4px solid #f97316}
.tier-3{border-left:4px solid #a78bfa}
.badge-ml{background:#064e3b;color:#6ee7b7;padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:700;letter-spacing:.02em}
.badge-rl{background:#1e3a5f;color:#60a5fa;padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:700;letter-spacing:.02em}
.badge-tot{background:#3b0764;color:#c4b5fd;padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:700;letter-spacing:.02em}
.detail-section{max-height:0;overflow:hidden;transition:max-height .35s ease}
.detail-section.open{max-height:1600px}
.tab-active{background:#1d4ed8!important;color:#fff!important}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.prob-bar{display:flex;height:22px;border-radius:11px;overflow:hidden}
/* hide scrollbar but keep scrollable */
.tab-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
/* stat chip */
.chip{background:#1e293b;border:1px solid #334155;border-radius:.5rem;padding:4px 10px;font-size:.72rem;color:#94a3b8;text-align:center;flex:1;min-width:0}
.chip b{color:#e2e8f0;display:block;font-size:.82rem}
/* drawer slides up from bottom on mobile */
@media(max-width:640px){
  #hist-drawer{bottom:0;top:auto;left:0;right:0;max-width:100%;border-radius:1rem 1rem 0 0;border-left:none;border-top:1px solid #334155;max-height:80vh}
}
</style>
</head>
<body class="min-h-screen">

<!-- в”Җв”Җв”Җ Header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<header class="sticky top-0 z-20 bg-slate-900/95 backdrop-blur border-b border-slate-700/50">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="flex-1 min-w-0">
      <h1 class="text-base font-bold text-white tracking-tight">вҡҫ CPBL Protector</h1>
      <div class="text-xs text-slate-500 truncate" id="gen-time">ијүе…ҘдёӯвҖҰ</div>
    </div>
    <div class="flex gap-2 items-center shrink-0">
      <button onclick="toggleHistory()" class="h-9 px-3 rounded-xl bg-slate-700 active:bg-slate-600 text-slate-300 text-xs font-medium">рҹ“Ӣ жӯ·еҸІ</button>
      <button onclick="openRunModal()" class="h-9 px-3 rounded-xl bg-blue-600 active:bg-blue-700 text-white text-xs font-bold">в–¶ еҹ·иЎҢ</button>
      <button onclick="loadData()" class="h-9 w-9 rounded-xl bg-slate-700 active:bg-slate-600 text-slate-300 flex items-center justify-center" title="йҮҚж–°ж•ҙзҗҶ"><span id="ri" class="text-base">вҶ»</span></button>
    </div>
  </div>
</header>

<!-- в”Җв”Җв”Җ Main content в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div class="max-w-2xl mx-auto px-3 py-3 space-y-3">

  <!-- Stats panel -->
  <div class="card p-4" id="stats-panel" style="display:none">
    <div class="grid grid-cols-3 gap-2 mb-3 text-center">
      <div class="bg-slate-800/60 rounded-xl p-3">
        <div class="text-2xl font-bold text-emerald-400" id="s-wr">вҖ”</div>
        <div class="text-xs text-slate-500 mt-0.5">еӢқзҺҮ</div>
      </div>
      <div class="bg-slate-800/60 rounded-xl p-3">
        <div class="text-2xl font-bold" id="s-roi">вҖ”</div>
        <div class="text-xs text-slate-500 mt-0.5">ROI</div>
      </div>
      <div class="bg-slate-800/60 rounded-xl p-3">
        <div class="text-xl font-bold text-slate-200" id="s-rec">вҖ”</div>
        <div class="text-xs text-slate-500 mt-0.5">еӢқ/зёҪ</div>
      </div>
    </div>
    <div id="form-strip" class="flex flex-wrap gap-1 pt-2 border-t border-slate-700/40 min-h-4"></div>
  </div>

  <!-- Filter tabs -->
  <div class="tab-scroll flex gap-2 overflow-x-auto pb-0.5 -mx-1 px-1">
    <button class="tab-btn tab-active whitespace-nowrap h-9 px-4 rounded-xl bg-slate-700 text-slate-300 text-sm font-medium" data-f="ALL" onclick="setFilter('ALL')">е…ЁйғЁ</button>
    <button class="tab-btn whitespace-nowrap h-9 px-4 rounded-xl bg-slate-700 text-slate-300 text-sm" data-f="ML" onclick="setFilter('ML')">рҹҺҜ ML зҚЁиҙҸ</button>
    <button class="tab-btn whitespace-nowrap h-9 px-4 rounded-xl bg-slate-700 text-slate-300 text-sm" data-f="RL" onclick="setFilter('RL')">рҹ“җ RL и®“еҲҶ</button>
    <button class="tab-btn whitespace-nowrap h-9 px-4 rounded-xl bg-slate-700 text-slate-300 text-sm" data-f="TOT" onclick="setFilter('TOT')">рҹ“Ҡ еӨ§е°ҸеҲҶ</button>
    <button class="tab-btn whitespace-nowrap h-9 px-4 rounded-xl bg-slate-700 text-slate-300 text-sm" data-f="LIVE" onclick="setFilter('LIVE')">рҹ”ҙ е ҙдёӯ</button>
  </div>

  <!-- Picks -->
  <div id="picks-container"><div class="card p-10 text-center text-slate-500">ијүе…ҘдёӯвҖҰ</div></div>

  <!-- Live section -->
  <div id="live-section" style="display:none">
    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">рҹ”ҙ е ҙдёӯжҜ”иіҪ</h2>
    <div id="live-container" class="space-y-2"></div>
  </div>

</div>

<!-- в”Җв”Җв”Җ History drawer в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div id="hist-overlay" class="fixed inset-0 bg-black/60 z-30 hidden" onclick="toggleHistory()">
  <div id="hist-drawer" class="absolute right-0 top-0 bottom-0 w-full max-w-sm bg-slate-900 border-l border-slate-700 overflow-y-auto p-4" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-white text-base">рҹ“Ӣ жӯ·еҸІзҙҖйҢ„</h2>
      <button onclick="toggleHistory()" class="h-9 w-9 rounded-xl bg-slate-700 active:bg-slate-600 text-slate-300 text-lg flex items-center justify-center">вң•</button>
    </div>
    <div id="hist-list" class="space-y-2"></div>
  </div>
</div>

<!-- в”Җв”Җв”Җ Run modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
<div id="run-overlay" class="fixed inset-0 bg-black/70 z-30 hidden items-end sm:items-center justify-center">
  <div class="card w-full max-w-md mx-0 sm:mx-4 p-5 rounded-b-none sm:rounded-xl" style="padding-bottom:max(20px,env(safe-area-inset-bottom,20px))">
    <h3 class="font-bold text-white text-base mb-1">в–¶ з«ӢеҚіеҹ·иЎҢй җжё¬</h3>
    <p class="text-xs text-slate-400 mb-4 leading-relaxed">йңҖиҰҒ GitHub PATпјҲ<b class="text-slate-200">workflow: write</b> ж¬ҠйҷҗпјүпјҢеғ…еӯҳеңЁжң¬ж©ҹзҖҸиҰҪеҷЁгҖӮ</p>
    <input id="pat-inp" type="password" placeholder="ghp_xxxxвҖҰ" autocomplete="current-password"
      class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-200 outline-none focus:border-blue-500 mb-3">
    <div id="run-st" class="text-sm text-center mb-3 min-h-5"></div>
    <div class="flex gap-2">
      <button onclick="closeRunModal()" class="flex-1 h-11 rounded-xl bg-slate-700 active:bg-slate-600 text-sm text-slate-200 font-medium">еҸ–ж¶Ҳ</button>
      <button onclick="doRun()" id="run-btn" class="flex-1 h-11 rounded-xl bg-blue-600 active:bg-blue-700 text-sm text-white font-bold">зўәиӘҚеҹ·иЎҢ</button>
    </div>
  </div>
</div>

<script>
const JSON_URL = "./picks_latest.json";
const REPO     = "willy0929716513-debug/CPBL";
const WORKFLOW = "cpbl_bot.yml";

let allPicks=[], allPredictions=[], allHistory=[], liveGames=[], currentFilter="ALL", cardIdx=0, gameDate="";
const TEAM_COLOR={AEL:"#3b82f6",CT:"#f59e0b",FG:"#ef4444",WL:"#8b5cf6",TSG:"#14b8a6",WC:"#e31937"};
const FACTOR_LABEL={starter:"е…ҲзҷјжҠ•жүӢ",lineup:"жү“з·ҡ",bullpen:"зүӣжЈҡ",odds:"иі зҺҮ",
  home_away:"дё»е®ўе ҙ",recent_form:"иҝ‘жіҒ",h2h:"H2H",injuries:"еӮ·е…ө",weather:"еӨ©ж°Ј",defense:"е®ҲеӮҷ"};

// в”Җв”Җ Data loading в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadData() {
  const ri=document.getElementById("ri");
  ri.classList.add("spin");
  try {
    const res=await fetch(JSON_URL+"?t="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    document.getElementById("gen-time").textContent="жӣҙж–°ж–ј "+data.generated_at;
    allPicks=data.picks||[]; allPredictions=data.predictions||[]; allHistory=data.recent_history||[]; liveGames=data.live_games||[];
    gameDate=data.game_date||"";
    renderStats(); renderPicks(); renderLive(); updateTabCounts();
  } catch(e) {
    document.getElementById("picks-container").innerHTML=
      `<div class="card p-10 text-center text-rose-400 text-sm">ијүе…ҘеӨұж•—пјҡ${e.message}<br><small class="text-slate-500 mt-1 block">и«Ӣе…Ҳеҹ·иЎҢй җжё¬ж©ҹеҷЁдәә</small></div>`;
  }
  ri.classList.remove("spin");
}

// в”Җв”Җ Stats panel в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderStats() {
  const panel=document.getElementById("stats-panel");
  if(!allHistory.length){panel.style.display="none";return;}
  panel.style.display="";
  const settled=allHistory.filter(h=>h.result!==null);
  const wins=settled.filter(h=>h.result==="W").length;
  const stake=settled.reduce((s,h)=>s+(h.stake||0),0);
  const pnl=settled.reduce((s,h)=>{
    if(h.result==="W") return s+(h.stake||0)*((h.bp||1.8)-1);
    if(h.result==="L") return s-(h.stake||0);
    return s;
  },0);
  const wr=settled.length?(wins/settled.length*100).toFixed(1)+"%":"вҖ”";
  const roi=stake?((pnl/stake)*100).toFixed(1):null;
  document.getElementById("s-wr").textContent=wr;
  document.getElementById("s-rec").textContent=`${wins}/${settled.length}`;
  const re=document.getElementById("s-roi");
  re.textContent=roi!==null?(roi>=0?"+":"")+roi+"%":"вҖ”";
  re.className="text-2xl font-bold "+(roi===null?"text-slate-400":parseFloat(roi)>=0?"text-emerald-400":"text-rose-400");
  document.getElementById("form-strip").innerHTML=settled.slice(-20).map(h=>{
    const [bg,fg,lbl]=h.result==="W"?["#065f46","#6ee7b7","W"]:["#7f1d1d","#fca5a5","L"];
    return `<span style="width:16px;height:16px;border-radius:4px;background:${bg};color:${fg};display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${lbl}</span>`;
  }).join("");
}

// в”Җв”Җ Filters в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setFilter(f) {
  currentFilter=f;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("tab-active",b.dataset.f===f));
  if(f==="LIVE"){
    document.getElementById("picks-container").innerHTML="";
    document.getElementById("live-section").style.display="";
  } else {
    document.getElementById("live-section").style.display=(liveGames.length&&f==="ALL")?"":"none";
    renderPicks();
  }
}

function updateTabCounts() {
  const cnt={ML:0,RL:0,TOT:0};
  allPicks.forEach(p=>{if(cnt[p.btype]!==undefined)cnt[p.btype]++;});
  const total = allPredictions.length || allPicks.length;
  document.querySelectorAll(".tab-btn").forEach(b=>{
    const f=b.dataset.f;
    if(f==="ALL"){b.textContent=`е…ЁйғЁ (${total})`;return;}
    if(f==="LIVE"){b.textContent=`рҹ”ҙ е ҙдёӯ (${liveGames.length})`;return;}
    const lbl={ML:"рҹҺҜ ML зҚЁиҙҸ",RL:"рҹ“җ RL и®“еҲҶ",TOT:"рҹ“Ҡ еӨ§е°ҸеҲҶ"}[f]||f;
    b.textContent=`${lbl} (${cnt[f]||0})`;
  });
}

// в”Җв”Җ Pitcher formatter в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function fmtSP(pitcher) {
  if(!pitcher||!pitcher.name) return "TBD";
  const tag = pitcher.foreign ? "рҹҢҸ " : "";
  const parts = [];
  if(pitcher.era!=null) parts.push(`ERA ${pitcher.era}`);
  if(pitcher.recent_3_era!=null) parts.push(`иҝ‘3е ҙ: ${pitcher.recent_3_era}`);
  if(pitcher.k9!=null) parts.push(`K/9: ${pitcher.k9}`);
  return `${tag}<b class="text-slate-200">${pitcher.name}</b><span class="text-slate-500 ml-1">${parts.join(' В· ')}</span>`;
}

// в”Җв”Җ Pick card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderCard(p) {
  const uid="d"+(cardIdx++);
  const aw=Math.round((p.away_win_prob||0)*100), hw=100-aw;
  const conf=Math.round((p.conf||0)*100);
  const edgeStr=((p.edge||0)*100).toFixed(1);
  const ac=TEAM_COLOR[p.away]||"#6b7280", hc=TEAM_COLOR[p.home]||"#6b7280";
  const asp=p.away_sp||{}, hsp=p.home_sp||{};
  const tc={1:"tier-1",2:"tier-2",3:"tier-3"}[p.tier]||"tier-3";
  const tl={1:"рҹ’Һ Diamond",2:"рҹ”Ҙ Fire",3:"вӯҗ Star"}[p.tier]||"вӯҗ Star";
  const bm={ML:"badge-ml",RL:"badge-rl",TOT:"badge-tot"}[p.btype]||"badge-ml";
  const bl={ML:"ML зҚЁиҙҸ",RL:"RL и®“еҲҶ",TOT:"еӨ§е°ҸеҲҶ"}[p.btype]||p.btype;
  const cg=conf>=75?"from-emerald-600 to-emerald-400":conf>=65?"from-amber-600 to-amber-400":"from-rose-600 to-rose-400";

  // Date + venue line
  const gd=(p.game_date||gameDate||"").replace(/^\d{4}-/,"");  // shorten to MM-DD
  const gt=p.game_time||p.time||"";
  const dtStr=[gd,gt].filter(Boolean).join(" ");
  const venueLine=dtStr?`<div class="text-xs text-slate-500 mt-1">рҹ—“пёҸ ${dtStr}${p.venue?" В· рҹҸҹпёҸ "+p.venue:""}</div>`:"";

  // Pitcher section (two rows)
  const spLine=(asp.name||hsp.name)?`
  <div class="mt-2 rounded-xl overflow-hidden border border-slate-700/50">
    <div class="bg-slate-800/40 px-3 py-1 text-xs text-slate-500 font-medium">вҡҫ е…ҲзҷјжҠ•жүӢ</div>
    <div class="bg-slate-800/20 px-3 py-2 space-y-1.5">
      <div class="flex items-baseline gap-2 text-xs">
        <span class="shrink-0 text-slate-600 font-medium w-4">е®ў</span>
        <span class="leading-relaxed">${fmtSP(asp)}</span>
      </div>
      <div class="flex items-baseline gap-2 text-xs">
        <span class="shrink-0 text-slate-600 font-medium w-4">дё»</span>
        <span class="leading-relaxed">${fmtSP(hsp)}</span>
      </div>
    </div>
  </div>` : "";

  // Bet recommendation
  const betBox=`
  <div class="mt-3 bg-slate-800/70 rounded-xl px-4 py-3 flex items-center justify-between gap-3">
    <div class="min-w-0">
      <div class="font-bold text-white text-base leading-tight">${p.bet_label}</div>
      <div class="text-slate-400 text-sm mt-0.5">иі зҺҮ <b class="text-slate-200">${p.bp}</b></div>
    </div>
    <button onclick="copyText('${p.bet_label} @ ${p.bp}')" class="shrink-0 h-9 px-3 rounded-lg bg-slate-700 active:bg-slate-600 text-slate-400 text-xs">рҹ“Ӣ иӨҮиЈҪ</button>
  </div>`;

  // Key stats row
  const statsRow=`
  <div class="mt-3 grid grid-cols-3 gap-2 text-center">
    <div class="bg-slate-800/60 rounded-xl py-2.5">
      <div class="text-lg font-bold text-emerald-400">+${edgeStr}%</div>
      <div class="text-xs text-slate-500 mt-0.5">йӮҠйҡӣе„ӘеӢў</div>
    </div>
    <div class="bg-slate-800/60 rounded-xl py-2.5">
      <div class="text-lg font-bold text-amber-400">${conf}%</div>
      <div class="text-xs text-slate-500 mt-0.5">дҝЎеҝғжҢҮж•ё</div>
    </div>
    <div class="bg-slate-800/60 rounded-xl py-2.5">
      <div class="text-lg font-bold text-blue-400">${hw}%</div>
      <div class="text-xs text-slate-500 mt-0.5">дё»йҡҠеӢқзҺҮ</div>
    </div>
  </div>`;

  // Confidence bar
  const confBar=`
  <div class="mt-2 h-1.5 bg-slate-700 rounded-full overflow-hidden">
    <div class="h-full rounded-full bg-gradient-to-r ${cg}" style="width:${conf}%"></div>
  </div>`;

  // Win probability bar
  const probBar=`
  <div class="mt-2 prob-bar">
    <div style="width:${aw}%;background:${ac};min-width:${aw>5?0:24}px" class="flex items-center justify-center text-xs font-bold text-white/90">${aw>8?aw+"%":""}</div>
    <div style="width:${hw}%;background:${hc};min-width:${hw>5?0:24}px" class="flex items-center justify-center text-xs font-bold text-white/90">${hw>8?hw+"%":""}</div>
  </div>
  <div class="mt-1 flex justify-between text-xs text-slate-600">
    <span>${p.away_cn}</span><span>${p.home_cn}</span>
  </div>`;

  // Odds detail grid (2 rows, equal columns)
  const mkt=Math.round(p.market_home_prob||0);
  const be=p.bp>1?(100/p.bp).toFixed(1):"?";
  const vg=p.value_gap||0;
  const vc=vg>3?"text-emerald-400":vg<-3?"text-rose-400":"text-slate-400";
  const oddsGrid=p.curr_home_odds?`
  <div class="mt-3 space-y-1.5">
    <div class="flex gap-1.5">
      <div class="chip"><b>${p.curr_away_odds}</b>е®ўйҡҠиі зҺҮ</div>
      <div class="chip"><b>${p.curr_home_odds}</b>дё»йҡҠиі зҺҮ</div>
      ${p.market_total?`<div class="chip"><b>${p.market_total}</b>еӨ§е°ҸеҲҶ</div>`:""}
    </div>
    <div class="flex gap-1.5">
      <div class="chip"><b>${mkt}%</b>еёӮе ҙдё»йҡҠ</div>
      <div class="chip"><b>${hw}%</b>жЁЎеһӢдё»йҡҠ</div>
      <div class="chip"><b class="text-slate-400">${be}%</b>зӣҲиҷ§е№іиЎЎ</div>
    </div>
    ${vg?`<div class="chip w-full ${vc}"><b class="${vc}">${vg>0?"+":""}${vg.toFixed(1)}%</b> жЁЎеһӢ vs еёӮе ҙе·®и·қ</div>`:""}
  </div>` : "";

  // Signals
  const sigs=(p.signals||[]).slice(0,2).map(s=>`
    <div class="bg-blue-950/60 border border-blue-800/30 text-blue-300 text-xs px-3 py-1.5 rounded-lg leading-relaxed">${s}</div>`).join("");

  return `<div class="card ${tc} p-4 mb-3">
  <!-- Card header -->
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-xs font-semibold text-slate-400">${tl}</span>
        <span class="${bm}">${bl}</span>
      </div>
      <div class="text-lg font-bold text-white mt-1 leading-tight">
        ${p.away_cn} <span class="text-slate-500 font-normal text-sm">@</span> ${p.home_cn}
      </div>
      ${venueLine}
    </div>
    <div class="text-right shrink-0">
      <div class="text-2xl font-bold text-emerald-400 leading-none">$${p.stake||0}</div>
      <div class="text-xs text-slate-500 mt-1">е»әиӯ°жіЁйЎҚ</div>
    </div>
  </div>

  ${spLine}
  ${betBox}
  ${statsRow}
  ${confBar}
  ${probBar}
  ${oddsGrid}
  ${sigs?`<div class="mt-2 space-y-1">${sigs}</div>`:""}

  <button onclick="toggleDetail('${uid}',this)"
    class="mt-3 w-full h-10 text-xs text-slate-500 active:text-slate-300 border-t border-slate-700/40 flex items-center justify-center gap-1">
    <span>в–ј</span><span>еұ•й–Ӣеӣ еӯҗи©іжғ…</span>
  </button>
  <div id="${uid}" class="detail-section">
    <div class="pt-3">${renderFactors(p.factors)}</div>
  </div>
</div>`;
}

// в”Җв”Җ Factor detail в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderFactors(f) {
  if(!f) return "";
  const entries=Object.entries(f).filter(([,v])=>typeof v==="number");
  if(!entries.length) return `<div class="text-xs text-slate-600 text-center py-2">и©ізҙ°еӣ еӯҗиіҮж–ҷдёҚеҸҜз”Ё</div>`;
  return `<div class="grid grid-cols-2 gap-1.5 text-xs">`+entries.map(([k,v])=>{
    const pct=Math.round(v*100);
    const bar=pct>=55?"bg-emerald-600":pct>=45?"bg-amber-600":"bg-rose-600";
    const w=Math.min(100,Math.abs(pct-50)*4+30);
    return `<div class="bg-slate-800 rounded-lg p-2">
      <div class="flex justify-between mb-1 text-slate-400">
        <span>${FACTOR_LABEL[k]||k}</span>
        <span class="${pct>=55?"text-emerald-400":pct<=45?"text-rose-400":"text-amber-400"}">${pct}%</span>
      </div>
      <div class="h-1.5 bg-slate-700 rounded overflow-hidden">
        <div class="${bar} h-full rounded" style="width:${w}%"></div>
      </div>
    </div>`;
  }).join("")+"</div>";
}

function toggleDetail(uid,btn) {
  const el=document.getElementById(uid);
  el.classList.toggle("open");
  const icon=btn.querySelector("span:first-child");
  const lbl=btn.querySelector("span:last-child");
  if(el.classList.contains("open")){icon.textContent="в–І";lbl.textContent="ж”¶иө·еӣ еӯҗи©іжғ…";}
  else{icon.textContent="в–ј";lbl.textContent="еұ•й–Ӣеӣ еӯҗи©іжғ…";}
}

// в”Җв”Җ Live games в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderLive() {
  const sec=document.getElementById("live-section"), con=document.getElementById("live-container");
  if(!liveGames.length){if(currentFilter!=="LIVE")sec.style.display="none";return;}
  if(currentFilter!=="LIVE")sec.style.display="";
  con.innerHTML=liveGames.map(g=>{
    const inn=`${g.top_inning?"в–І":"в–ј"}${g.inning}еұҖ`;
    const bet=g.bet?`<div class="mt-3 bg-emerald-900/40 border border-emerald-700/50 rounded-lg px-3 py-2 text-xs text-emerald-300">
      рҹ’Ў <b>${g.bet}</b><br><span class="text-emerald-400/80">${g.reason||""}</span>
    </div>`:"";
    return `<div class="card p-4">
      <div class="flex justify-between items-center">
        <div>
          <div class="font-bold text-base">${g.away_cn} <span class="text-slate-400 text-sm">@</span> ${g.home_cn}</div>
          <div class="text-xs text-slate-500 mt-0.5">${inn} В· й җиЁҲ ${g.projected_total||"вҖ”"} еҲҶ</div>
        </div>
        <div class="text-right">
          <div class="text-3xl font-bold tracking-tight">${g.away_runs}:<span class="text-emerald-400">${g.home_runs}</span></div>
        </div>
      </div>${bet}</div>`;
  }).join("");
}

// в”Җв”Җ History drawer в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function toggleHistory() {
  const ov=document.getElementById("hist-overlay");
  const showing=!ov.classList.contains("hidden");
  ov.classList.toggle("hidden",showing);
  if(!showing&&allHistory.length){
    document.getElementById("hist-list").innerHTML=[...allHistory].reverse().map(h=>{
      const [rc,lbl]=h.result==="W"?["text-emerald-400","вң… еӢқ"]:h.result==="L"?["text-rose-400","вқҢ иІ "]:["text-slate-400","вҸі еҫ…зөҗз®—"];
      return `<div class="card p-3.5">
        <div class="flex justify-between items-start">
          <span class="text-slate-500 text-xs">${h.date||""}</span>
          <span class="font-bold text-xs ${rc}">${lbl}</span>
        </div>
        <div class="font-semibold text-sm mt-1">${h.bet_label||h.bet_type||""}</div>
        <div class="text-slate-500 text-xs mt-0.5">${h.away||""} @ ${h.home||""} В· иі зҺҮ ${h.bp||"?"} В· жіЁ $${h.stake||"?"}</div>
      </div>`;
    }).join("");
  }
}

// в”Җв”Җ Run modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openRunModal(){
  const ov=document.getElementById("run-overlay");
  ov.classList.remove("hidden"); ov.classList.add("flex");
  document.getElementById("pat-inp").value=localStorage.getItem("cpbl_pat")||"";
  document.getElementById("run-st").textContent="";
}
function closeRunModal(){
  const ov=document.getElementById("run-overlay");
  ov.classList.add("hidden"); ov.classList.remove("flex");
}
async function doRun(){
  const token=document.getElementById("pat-inp").value.trim();
  if(!token){alert("и«Ӣијёе…Ҙ PAT");return;}
  localStorage.setItem("cpbl_pat",token);
  const btn=document.getElementById("run-btn"),st=document.getElementById("run-st");
  btn.disabled=true;btn.textContent="еҹ·иЎҢдёӯвҖҰ";st.textContent="";
  try{
    const res=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {method:"POST",headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json",
       "X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"},body:JSON.stringify({ref:"main"})});
    if(res.status===204){
      st.className="text-sm text-center mb-3 text-emerald-400";
      st.textContent="вң… е·ІжҲҗеҠҹи§ёзҷјпјҒзҙ„йңҖ 2 еҲҶйҗҳеҫҢи«ӢйҮҚж–°ж•ҙзҗҶгҖӮ";
      setTimeout(closeRunModal,3500);
    }else{
      const j=await res.json().catch(()=>({}));
      st.className="text-sm text-center mb-3 text-rose-400";
      st.textContent="вқҢ "+(j.message||"еӨұж•— "+res.status);
    }
  }catch(e){
    st.className="text-sm text-center mb-3 text-rose-400";
    st.textContent="вқҢ "+e.message;
  }
  btn.disabled=false;btn.textContent="зўәиӘҚеҹ·иЎҢ";
}
document.getElementById("run-overlay").addEventListener("click",function(e){if(e.target===this)closeRunModal();});

// в”Җв”Җ Picks + Predictions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderPicks() {
  const container = document.getElementById("picks-container");
  if (currentFilter === "LIVE") return;
  cardIdx = 0;
  let html = "";

  if (currentFilter === "ALL") {
    const nonRec = allPredictions.filter(p => !p.recommended);
    if (allPicks.length) {
      html += allPicks.map(p => renderCard(p)).join("");
    }
    if (nonRec.length) {
      if (allPicks.length) {
        html += `<div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-1 mt-2">рҹ“Ҡ д»Ҡж—Ҙе…¶д»–жҜ”иіҪпјҲеғ…дҫӣеҸғиҖғпјү</div>`;
      }
      html += nonRec.map(p => renderRefCard(p)).join("");
    }
    if (!allPicks.length && !nonRec.length) {
      html = `<div class="card p-10 text-center text-slate-500">д»Ҡж—Ҙз„ЎеҲҶжһҗиіҮж–ҷ<br><small class="text-slate-600 mt-2 block">и«Ӣе…Ҳеҹ·иЎҢй җжё¬ж©ҹеҷЁдәә</small></div>`;
    }
  } else {
    const filtered = allPicks.filter(p => p.btype === currentFilter);
    html = filtered.length
      ? filtered.map(p => renderCard(p)).join("")
      : `<div class="card p-10 text-center text-slate-500">з„Ў ${currentFilter} жҺЁи–Ұ</div>`;
  }

  container.innerHTML = html;
}

function renderRefCard(p) {
  const hw = Math.round((p.home_win_prob||0)*100);
  const aw = Math.round((p.away_win_prob||0)*100);
  const ac = TEAM_COLOR[p.away]||"#6b7280";
  const hc = TEAM_COLOR[p.home]||"#6b7280";
  const asp = p.away_sp||{};
  const hsp = p.home_sp||{};
  const gd = (p.game_date||gameDate||"").replace(/^\d{4}-/,"");
  const gt = p.game_time||p.time||"";
  const dtStr = [gd,gt].filter(Boolean).join(" ");
  const venueLine = dtStr
    ? `<div class="text-xs text-slate-500 mt-1">рҹ—“пёҸ ${dtStr}${p.venue?" В· рҹҸҹпёҸ "+p.venue:""}</div>` : "";
  const spLine = (asp.name||hsp.name) ? `
  <div class="mt-2 rounded-xl overflow-hidden border border-slate-700/50">
    <div class="bg-slate-800/40 px-3 py-1 text-xs text-slate-500 font-medium">вҡҫ е…ҲзҷјжҠ•жүӢ</div>
    <div class="bg-slate-800/20 px-3 py-2 space-y-1.5">
      <div class="flex items-baseline gap-2 text-xs"><span class="shrink-0 text-slate-600 font-medium w-4">е®ў</span><span class="leading-relaxed">${fmtSP(asp)}</span></div>
      <div class="flex items-baseline gap-2 text-xs"><span class="shrink-0 text-slate-600 font-medium w-4">дё»</span><span class="leading-relaxed">${fmtSP(hsp)}</span></div>
    </div>
  </div>` : "";
  const advTeam = hw >= aw ? p.home_cn : p.away_cn;
  const advPct  = Math.max(hw, aw);
  const defPct  = Math.min(hw, aw);

  return `<div class="card p-4 mb-3" style="border-left:4px solid #475569">
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <div class="text-base font-bold text-slate-300 leading-tight">${p.away_cn} <span class="text-slate-600 font-normal text-sm">@</span> ${p.home_cn}</div>
      ${venueLine}
    </div>
    <div class="shrink-0 bg-amber-950/60 border border-amber-700/50 rounded-lg px-2.5 py-1 text-center">
      <div class="text-xs font-bold text-amber-400">дёҚе»әиӯ°</div>
      <div class="text-xs text-amber-500/70">дёӢжіЁ</div>
    </div>
  </div>
  ${spLine}
  <div class="mt-3 prob-bar">
    <div style="width:${aw}%;background:${ac};min-width:${aw>5?0:24}px" class="flex items-center justify-center text-xs font-bold text-white/90">${aw>8?aw+"%":""}</div>
    <div style="width:${hw}%;background:${hc};min-width:${hw>5?0:24}px" class="flex items-center justify-center text-xs font-bold text-white/90">${hw>8?hw+"%":""}</div>
  </div>
  <div class="mt-1 flex justify-between text-xs text-slate-600">
    <span>${p.away_cn}</span><span>${p.home_cn}</span>
  </div>
  <div class="mt-2 bg-slate-800/40 rounded-xl px-3 py-2 text-sm">
    <b class="text-slate-200">${advTeam}</b><span class="text-slate-400"> еӢқз®—ијғй«ҳ (${advPct}% vs ${defPct}%)</span>
  </div>
  <div class="mt-2 flex items-center gap-2 bg-amber-950/40 border border-amber-800/30 rounded-lg px-3 py-2">
    <span class="text-amber-400 text-sm">вҡ пёҸ</span>
    <span class="text-amber-300/80 text-xs">е…©йҡҠе·®и·қдёҚи¶іпјҢдёҚе»әиӯ°дёӢжіЁ</span>
  </div>
</div>`;
}

// в”Җв”Җ Utilities в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function copyText(t){
  navigator.clipboard?.writeText(t).then(()=>{
    const el=document.createElement("div");
    el.className="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-emerald-700 text-white text-sm px-4 py-2 rounded-full shadow-lg";
    el.textContent="вң“ е·ІиӨҮиЈҪ";document.body.appendChild(el);setTimeout(()=>el.remove(),1800);
  });
}

loadData();
setInterval(loadData,300000);
</script>
